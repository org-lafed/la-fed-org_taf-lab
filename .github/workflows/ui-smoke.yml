name: UI Smoke

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  ui-smoke-structure-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile scaffold only
        run: mvn -q -DskipTests test-compile -Denv=ci
