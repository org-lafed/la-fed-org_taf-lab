name: UI Smoke

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  ui-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run smoke suite
        run: mvn -B clean test -DsuiteXmlFile=src/test/resources/suites/smoke.xml -Denv=ci

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-surefire-reports
          path: target/surefire-reports
          if-no-files-found: warn

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-allure-results
          path: target/allure-results
          if-no-files-found: warn
